<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CC9F0">
    <meta name="description" content="SPA de Finanzas Personales">
    <link rel="icon" type="image/png" href="16.png">
    <link rel="manifest" href="manifest.json">
    <title>Mis Finanzas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app" id="app">
        <header class="header">
            <div class="container header__content">
                <a href="#/" class="header__logo">Mis Finanzas</a>
                <nav class="nav" id="nav"></nav>
                <button class="settings-btn" onclick="openSettings()" title="Ajustes">⚙️</button>
            </div>
        </header>

        <div id="toast" class="toast" style="display: none;"></div>

        <main class="main">
            <div class="container" id="main-content">
            </div>
        </main>

        <div class="modal-overlay" id="modal-overlay">
            <div class="modal" id="modal">
                <h3 class="modal__title" id="modal-title">Confirmar</h3>
                <p class="modal__content" id="modal-content">¿Estás seguro?</p>
                <div class="modal__actions">
                    <button class="modal__btn modal__btn--import" id="modal-import">Importar</button>
                    <button class="modal__btn modal__btn--cancel" id="modal-cancel">Cancelar</button>
                    <button class="modal__btn modal__btn--confirm" id="modal-confirm">Confirmar</button>
                </div>
            </div>
        </div>

        <a href="#/agregar" class="fab" title="Agregar movimiento">+</a>
    </div>

    <footer class="footer">
        <div class="container">
            © 2026 albert.407 Finanzas Personales
        </div>
    </footer>

    <!-- Cargar scripts en orden de dependencias -->
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
